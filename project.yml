name: HermesMonitor
options:
  bundleIdPrefix: com.hermes.monitor
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  CSQLite:
    type: framework
    platform: macOS
    sources:
      - path: Sources/CSQLite/shim.h
        headerVisibility: public
      - path: Sources/CSQLite/module.modulemap
        type: file
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hermes.monitor.CSQLite
        DEFINES_MODULE: YES
        MODULEMAP_FILE: Sources/CSQLite/module.modulemap
        SYSTEM_HEADER_SEARCH_PATHS: "$(inherited) /opt/homebrew/include /usr/local/include"
        HEADER_SEARCH_PATHS: "$(inherited) /opt/homebrew/include /usr/local/include"
        OTHER_LDFLAGS: "-lsqlite3"

  HermesMonitorCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/HermesMonitorCore
    dependencies:
      - target: CSQLite
      - sdk: Security.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hermes.monitor.core
        DEFINES_MODULE: YES

  HermesMonitor:
    type: application
    platform: macOS
    sources:
      - path: Sources/HermesMonitorApp
    dependencies:
      - target: HermesMonitorCore
      - sdk: AVFoundation.framework
      - sdk: Carbon.framework
      - sdk: UserNotifications.framework
      - sdk: Security.framework
      - sdk: libsqlite3.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hermes.monitor.app
        INFOPLIST_FILE: Info.plist
        PRODUCT_NAME: HermesMonitor
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks /usr/lib/swift"
        EMBEDDED_CONTENT_CONTAINS_SWIFT: YES