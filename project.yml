name: HermesMonitor
options:
  bundleIdPrefix: com.hermes.monitor
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  HermesMonitor:
    type: application
    platform: macOS
    sources:
      - path: Sources/HermesMonitorApp
      - path: Sources/HermesMonitorCore
      - path: Sources/CSQLite
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hermes.monitor.app
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright 2026. All rights reserved."
        PRODUCT_NAME: HermesMonitor
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        ldFrameworks:
          - AVFoundation
          - Carbon
          - UserNotifications
          - Security
        OTHER_LDFLAGS: "-lsqlite3"
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: Carbon.framework
      - sdk: UserNotifications.framework
      - sdk: Security.framework